<!DOCTYPE html>
<html lang="en" ng-app="registrationApp">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body ng-controller="FormController">

<div class="container">
    <h2>User Registration Form</h2>

    <form name="regForm" ng-submit="submitForm()" novalidate>

        <!-- Name -->
        <label>Name:</label>
        <input type="text" name="name" ng-model="user.name" required>
        <span class="error" ng-show="regForm.name.$touched && regForm.name.$invalid">
            Name is required
        </span>

        <!-- Email -->
        <label>Email:</label>
        <input type="email" name="email" ng-model="user.email" required>
        <span class="error" ng-show="regForm.email.$touched && regForm.email.$invalid">
            Enter valid email
        </span>

        <!-- Password -->
        <label>Password:</label>
        <input type="password" name="password" ng-model="user.password" ng-minlength="6" required>
        <span class="error" ng-show="regForm.password.$touched && regForm.password.$invalid">
            Minimum 6 characters required
        </span>

        <!-- Gender -->
        <label>Gender:</label>
        <select ng-model="user.gender" required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <!-- Submit -->
        <button type="submit" ng-disabled="regForm.$invalid">Register</button>
    </form>

    <!-- Output -->
    <div ng-if="submitted">
        <h3>Registered Details</h3>
        <p><b>Name:</b> {{user.name}}</p>
        <p><b>Email:</b> {{user.email}}</p>
        <p><b>Gender:</b> {{user.gender}}</p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
